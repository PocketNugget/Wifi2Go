# Public Captive Portal
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Routes handling by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Deno backend (Catch-all Portal)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Admin Dashboard (Isolated Port)
server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Restrict to local network if possible, but keep accessible for testing
    
    # Routes handling by React Router 
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Admin API calls to protected Deno backend endpoints
    location /admin-api/ {
        proxy_pass http://backend:8443/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Admin auth headers could be enforced here if required at nginx level
    }
}
